        async function fetchGemini(payload, retries = 5, delay = 1000) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${apiKey}`;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) return await response.json();
                } catch (error) {}
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2; 
            }
            throw new Error("El vacío no responde. Inténtalo de nuevo.");
        }

        let currentTrackIdx = 0;
        let isPlaying = false;

        const player = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const songTitle = document.getElementById('song-title');

        function loadTrack(idx) {
            currentTrackIdx = idx;
            const track = remotePlaylist[currentTrackIdx];
            document.getElementById('audio-source').src = track.file;
            player.load();
            songTitle.textContent = track.title;
            if (isPlaying) player.play();
        }

        function toggleAudio() {
            if (isPlaying) {
                player.pause();
                playBtn.innerHTML = "▶";
                isPlaying = false;
            } else {
                player.play().then(() => {
                    playBtn.innerHTML = "⏸";
                    isPlaying = true;
                }).catch(() => {});
            }
        }

        function nextSong() {
            currentTrackIdx = (currentTrackIdx + 1) % remotePlaylist.length;
            loadTrack(currentTrackIdx);
        }

        function prevSong() {
            currentTrackIdx = (currentTrackIdx - 1 + remotePlaylist.length) % remotePlaylist.length;
            loadTrack(currentTrackIdx);
        }

        loadTrack(0);

        async function askOracle() {
            const inputEl = document.getElementById('oracle-input');
            const responseEl = document.getElementById('oracle-response');
            const loadingEl = document.getElementById('oracle-loading');
            const submitBtn = document.getElementById('oracle-submit');
            
            const question = inputEl.value.trim();
            if (!question) return;

            loadingEl.classList.remove('hidden');
            responseEl.classList.add('hidden');
            submitBtn.disabled = true;

            const systemPrompt = `Eres un sabio y solemne archivero místico del reino en ruinas de Hallownest, de Hollow Knight. Responde a la pregunta del usuario en español, utilizando un tono poético, melancólico, respetuoso y sumamente inmersivo con el universo del juego. No rompas tu personaje bajo ninguna circunstancia. Si la pregunta no se relaciona con Hollow Knight, responde solemnemente que los secretos de otras tierras están ocultos tras la niebla.`;

            const payload = {
                contents: [{ parts: [{ text: question }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const result = await fetchGemini(payload);
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    responseEl.innerHTML = text.replace(/\n/g, '<br>');
                    responseEl.classList.remove('hidden');
                } else {
                    responseEl.textContent = "El vacío permaneció en silencio...";
                    responseEl.classList.remove('hidden');
                }
            } catch (error) {
                responseEl.textContent = error.message;
                responseEl.classList.remove('hidden');
            } finally {
                loadingEl.classList.add('hidden');
                submitBtn.disabled = false;
            }
        }

        async function forgeCharms() {
            const inputEl = document.getElementById('forge-input');
            const responseEl = document.getElementById('forge-response');
            const loadingEl = document.getElementById('forge-loading');
            const submitBtn = document.getElementById('forge-submit');

            const styleDescription = inputEl.value.trim();
            if (!styleDescription) return;

            loadingEl.classList.remove('hidden');
            responseEl.classList.add('hidden');
            submitBtn.disabled = true;

            const systemPrompt = `Eres un armero experto y maestro de combate de Hollow Knight. Diseña una build óptima de amuletos en base a la descripción del estilo de juego proporcionada por el usuario. Debes responder estrictamente con un objeto JSON en español, sin texto adicional antes ni después del bloque JSON, respetando el siguiente esquema exacto:
            {
                "buildName": "Nombre épico de la build en español",
                "charmsList": [
                    { "name": "Nombre de amuleto 1", "cost": 3, "effect": "Efecto rápido resumido" }
                ],
                "justification": "Explicación de por qué esta combinación funciona.",
                "stats": [fisico, magia, defensa, movilidad]
            }
            Donde "stats" es una lista de exactamente 4 números enteros de 0 a 100 para el radar.`;

            const payload = {
                contents: [{ parts: [{ text: styleDescription }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            try {
                const result = await fetchGemini(payload);
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                const data = JSON.parse(text);

                if (data) {
                    let charmsHtml = data.charmsList.map(c => `
                        <div class="bg-black/40 p-1.5 rounded border border-gray-800/80 flex justify-between items-center text-[8px] mt-1">
                            <div>
                                <strong class="text-sky-300">${c.name}</strong>
                                <span class="text-gray-400 block">${c.effect}</span>
                            </div>
                            <span class="text-[8px] text-gray-500 bg-gray-900 px-1.5 py-0.5 rounded">Costo: ${c.cost}</span>
                        </div>
                    `).join('');

                    responseEl.innerHTML = `
                        <div>
                            <h4 class="text-[10px] font-bold text-cyan-400">🔨 Build: ${data.buildName}</h4>
                            <p class="text-[9px] text-gray-400 italic mb-2">${data.justification}</p>
                            ${charmsHtml}
                        </div>
                    `;
                    responseEl.classList.remove('hidden');

                    pageData.arsenal.builds.push({
                        nombre: `✨ Forjada: ${data.buildName}`,
                        desc: data.justification,
                        stats: data.stats
                    });

                    if (currentChart) {
                        currentChart.data.datasets.push({
                            label: `✨ ${data.buildName}`,
                            data: data.stats,
                            backgroundColor: 'rgba(34, 211, 238, 0.1)',
                            borderColor: 'rgba(34, 211, 238, 0.8)',
                            pointBackgroundColor: 'rgba(34, 211, 238, 1)',
                            borderWidth: 2
                        });
                        currentChart.update();
                    }
                }
            } catch (error) {
                responseEl.innerHTML = `<p class="text-xs text-red-400 font-mono">${error.message}</p>`;
                responseEl.classList.remove('hidden');
            } finally {
                loadingEl.classList.add('hidden');
                submitBtn.disabled = false;
            }
        }

        function initChart() {
            const ctx = document.getElementById('buildsChart');
            if (!ctx) return;

            if (currentChart) currentChart.destroy();

            const dataObj = pageData.arsenal.builds;

            const datasets = dataObj.map((b, i) => {
                let color = '56, 189, 248'; 
                if (i === 1) color = '236, 72, 153'; 
                if (i === 2) color = '245, 158, 11'; 
                if (i > 2) color = '34, 211, 238'; 

                return {
                    label: b.nombre,
                    data: b.stats,
                    backgroundColor: `rgba(${color}, 0.1)`,
                    borderColor: `rgba(${color}, 0.8)`,
                    pointBackgroundColor: `rgba(${color}, 1)`,
                    borderWidth: 2
                };
            });

            currentChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Físico / Aguijón', 'Magia / Alma', 'Defensa / Cura', 'Movilidad'],
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            position: 'bottom', 
                            labels: { 
                                color: '#9ca3af',
                                font: { family: 'Inter', size: 9 } 
                            } 
                        }
                    },
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.08)' },
                            grid: { color: 'rgba(255, 255, 255, 0.08)' },
                            pointLabels: { 
                                font: { family: 'Inter', size: 8 }, 
                                color: '#9ca3af' 
                            },
                            ticks: { display: false, min: 0, max: 100 }
                        }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTab('inicio');
        });

        window.switchTab = renderTab;
        window.toggleAccordion = toggleAccordion;

    </script>
</body>
</html>
